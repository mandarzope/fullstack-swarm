<svg xmlns="http://www.w3.org/2000/svg" width="960" height="280" viewBox="0 0 960 280" role="img" aria-label="fullstack-swarm pipeline from PRD to DONE">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="960" height="280" rx="16" fill="url(#bg)"/>
  <text x="32" y="36" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" letter-spacing="0.08em">FULLSTACK-SWARM</text>
  <text x="32" y="58" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="600">PRD ’ stories ’ design ’ build ’ QA ’ DONE</text>

  <!-- nodes -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" text-anchor="middle">
    <rect x="32" y="100" width="100" height="56" rx="10" fill="#134e4a" stroke="#14b8a6"/>
    <text x="82" y="125" fill="#ccfbf1" font-weight="600">PRD</text>
    <text x="82" y="143" fill="#99f6e4">current.md</text>

    <rect x="156" y="100" width="100" height="56" rx="10" fill="#1e3a5f" stroke="#38bdf8"/>
    <text x="206" y="125" fill="#e0f2fe" font-weight="600">Stories</text>
    <text x="206" y="143" fill="#bae6fd">PM + queue</text>

    <rect x="280" y="100" width="100" height="56" rx="10" fill="#1e3a5f" stroke="#38bdf8"/>
    <text x="330" y="125" fill="#e0f2fe" font-weight="600">HLD / LLD</text>
    <text x="330" y="143" fill="#bae6fd">Arch + TL</text>

    <rect x="404" y="100" width="100" height="56" rx="10" fill="#422006" stroke="#f59e0b"/>
    <text x="454" y="125" fill="#fef3c7" font-weight="600">UX</text>
    <text x="454" y="143" fill="#fde68a">ui / fullstack</text>

    <rect x="528" y="100" width="100" height="56" rx="10" fill="#134e4a" stroke="#14b8a6"/>
    <text x="578" y="125" fill="#ccfbf1" font-weight="600">Build</text>
    <text x="578" y="143" fill="#99f6e4">BE / FE</text>

    <rect x="652" y="100" width="100" height="56" rx="10" fill="#3b1d4a" stroke="#c084fc"/>
    <text x="702" y="125" fill="#f3e8ff" font-weight="600">QA</text>
    <text x="702" y="143" fill="#e9d5ff">functional</text>

    <rect x="776" y="100" width="100" height="56" rx="10" fill="#14532d" stroke="#22c55e"/>
    <text x="826" y="125" fill="#dcfce7" font-weight="600">DONE</text>
    <text x="826" y="143" fill="#bbf7d0">+ visual QA</text>
  </g>

  <!-- arrows -->
  <g stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="132" y1="128" x2="150" y2="128"/>
    <line x1="256" y1="128" x2="274" y2="128"/>
    <line x1="380" y1="128" x2="398" y2="128"/>
    <line x1="504" y1="128" x2="522" y2="128"/>
    <line x1="628" y1="128" x2="646" y2="128"/>
    <line x1="752" y1="128" x2="770" y2="128"/>
  </g>

  <!-- track note -->
  <text x="32" y="200" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">Tracks: backend skips UX + visual QA · ui / fullstack go through both</text>
  <text x="32" y="228" fill="#64748b" font-family="ui-monospace, monospace" font-size="12">/swarm-init   ’   /ship-prd   ’   /status   ·   /next</text>
  <text x="32" y="256" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">Eight specialized subagents · typed status machine · no subagent-to-subagent dispatch</text>
</svg>
